type Note {
  noteId: ID!
  title: String!
  content: String!
  category: String

  images: [String]
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type Flashcard {
  cardId: ID!
  deckId: ID!
  front: String!
  back: String!
  noteId: ID
  easeFactor: Float!
  interval: Int!
  repetitions: Int!
  nextReviewDate: AWSDateTime!
  createdAt: AWSDateTime!
}

type Group {
  groupId: ID!
  name: String!
  color: String
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

input CreateNoteInput {
  title: String!
  content: String!
  category: String

  images: [String]
}

input UpdateNoteInput {
  title: String
  content: String
  category: String

  images: [String]
}

input CreateFlashcardInput {
  deckId: ID!
  front: String!
  back: String!
  noteId: ID
}

input UpdateFlashcardInput {
  deckId: ID
  front: String
  back: String
}

input CreateGroupInput {
  name: String!
  color: String
}

input UpdateGroupInput {
  name: String
  color: String
}

type TodoItem {
  id: String!
  text: String!
  completed: Boolean!
  createdAt: AWSDateTime!
}

type UserSettings {
  examDate: String
  todos: [TodoItem]
  updatedAt: AWSDateTime!
}

input TodoItemInput {
  id: String!
  text: String!
  completed: Boolean!
  createdAt: AWSDateTime!
}

input SaveUserSettingsInput {
  examDate: String
  todos: [TodoItemInput]
}

type Video {
  videoId: ID!
  title: String!
  description: String
  category: String!
  s3Key: String!
  thumbnailKey: String
  duration: Int
  order: Int
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

input CreateVideoInput {
  title: String!
  description: String
  category: String!
  s3Key: String!
  thumbnailKey: String
  duration: Int
  order: Int
}

input UpdateVideoInput {
  title: String
  description: String
  category: String
  s3Key: String
  thumbnailKey: String
  duration: Int
  order: Int
}

type NotesConnection {
  items: [Note]
  nextToken: String
}

type Query {
  getNotes(limit: Int, nextToken: String): NotesConnection
  getNote(noteId: ID!): Note
  getFlashcards(deckId: ID!): [Flashcard]
  getDueFlashcards: [Flashcard]
  getGroups: [Group]
  getGroup(groupId: ID!): Group
  getUserSettings: UserSettings
  getVideos: [Video]
  getVideo(videoId: ID!): Video
  getVideosByCategory(category: String!): [Video]
}

type Mutation {
  createNote(input: CreateNoteInput!): Note
  updateNote(noteId: ID!, input: UpdateNoteInput!): Note
  deleteNote(noteId: ID!): Boolean
  createFlashcard(input: CreateFlashcardInput!): Flashcard
  updateFlashcard(cardId: ID!, input: UpdateFlashcardInput!): Flashcard
  reviewFlashcard(cardId: ID!, quality: Int!): Flashcard
  createGroup(input: CreateGroupInput!): Group
  updateGroup(groupId: ID!, input: UpdateGroupInput!): Group
  deleteGroup(groupId: ID!): Boolean
  saveUserSettings(input: SaveUserSettingsInput!): UserSettings
  createVideo(input: CreateVideoInput!): Video
  updateVideo(videoId: ID!, input: UpdateVideoInput!): Video
  deleteVideo(videoId: ID!): Boolean
}
